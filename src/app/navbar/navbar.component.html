<header class="navbar">
  <div class="brand">Aurorama</div>

  <button class="hamburger" (click)="toggle()">☰</button>

  <nav [class.open]="mobileOpen">

    <!-- Normal Links -->
    <a class="nav-link" routerLink="/dashboardview" routerLinkActive="active">
      Dashboard
    </a>

    <a class="nav-link" routerLink="/inventory" routerLinkActive="active">
      Inventory
    </a>

    <!-- Raw Materials -->
    <div class="nav-item">
      <span>Raw Materials ▾</span>
      <div class="dropdown">
        <a routerLink="/rawmaterial">Raw Materials</a>

      <div class="dropdown">
        <a routerLink="/vendor">Add Vendor</a>
